name: Generate & Deploy

on:
  schedule:
    # 3 runs per day: 6am, 12pm, 6pm UTC
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"

  workflow_dispatch:
    inputs:
      run_count:
        description: "Number of articles to generate (default: 3)"
        required: false
        default: "3"

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    # Queues concurrent runs — never cancels, never runs two at once.
    # Prevents git push conflicts when all 3 cron triggers fire close together.
    concurrency:
      group: generate-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "baaghinitesh"
          git config user.email "baaghinitesh@gmail.com"
          # Embed token in remote URL so gitpython push works without SSH keys
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/baaghinitesh/dailly-notes.git

      # Pull latest AFTER pip install so we always have the freshest topic files
      # and already-generated article list before picking what to write next.
      - name: Pull latest commits
        run: git pull --rebase origin main

      - name: Generate content
        id: generate
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AUTHOR_NAME: "baaghinitesh"
          AUTHOR_EMAIL: "baaghinitesh@gmail.com"
          RUN_COUNT: ${{ github.event.inputs.run_count || '3' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python main.py
          # Check if any new files were committed (main.py does the push itself)
          # We just need to know if mkdocs deploy is worth running
          if git log --oneline -1 | grep -qE "📝|📘|🔄|🤖"; then
            echo "new_content=true" >> $GITHUB_OUTPUT
          else
            echo "new_content=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to GitHub Pages
        if: steps.generate.outputs.new_content == 'true' || github.event_name == 'workflow_dispatch'
        run: mkdocs gh-deploy --force
