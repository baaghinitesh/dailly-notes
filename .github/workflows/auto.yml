name: Generate & Deploy

on:
  schedule:
    - cron: "0 3,15 * * *"   # twice daily — 3am and 3pm UTC

  workflow_dispatch:
    inputs:
      run_count:
        description: "Number of articles to generate"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "baaghinitesh"
          git config user.email "baaghinitesh@gmail.com"

      - name: Generate content
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AUTHOR_NAME: "baaghinitesh"
          AUTHOR_EMAIL: "baaghinitesh@gmail.com"
          RUN_COUNT: ${{ github.event.inputs.run_count || '1' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python main.py

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
