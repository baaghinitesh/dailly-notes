name: Generate Content

on:
  schedule:
    # 4 runs per day: 6am, 10am, 2pm, 6pm UTC
    - cron: "0 6 * * *"
    - cron: "0 10 * * *"
    - cron: "0 14 * * *"
    - cron: "0 18 * * *"

  workflow_dispatch:
    inputs:
      run_count:
        description: "Number of articles to generate (default: 5)"
        required: false
        default: "5"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    # Queue concurrent runs — never cancels, never runs two at once.
    # Prevents git push conflicts when cron triggers fire close together.
    concurrency:
      group: generate
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "baaghinitesh"
          git config user.email "baaghinitesh@gmail.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/baaghinitesh/dailly-notes.git

      # Pull latest AFTER pip install so we always have the freshest topic files
      # and already-generated article list before picking what to write next.
      - name: Pull latest commits
        run: git pull --rebase origin main

      - name: Generate content
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AUTHOR_NAME: "baaghinitesh"
          AUTHOR_EMAIL: "baaghinitesh@gmail.com"
          RUN_COUNT: ${{ github.event.inputs.run_count || '5' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python main.py
